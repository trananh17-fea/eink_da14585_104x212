<!doctype html>
<html lang="vi-VN">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đồng bộ thời gian Bluetooth</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body cz-shortcut-listen="true">
    <div class="container">
      <h1>Tải ảnh qua Bluetooth</h1>

      <div class="card">
        <h2 style="margin-bottom: 20px; color: #4a5568">Chọn chế độ</h2>

        <div
          style="
            margin-bottom: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
          "
        >
          <h3
            style="
              margin: 0 0 8px 0;
              color: #4a5568;
              font-size: 14px;
              font-weight: 600;
            "
          >
            Thời gian hiện tại
          </h3>
          <div
            id="currentTime"
            style="font-size: 18px; font-weight: 600; color: #2d3748"
          >
            2026-03-18 22:14:53
          </div>
        </div>

        <div class="buttons">
          <button id="connectBtn" class="control-btn">Kết nối thiết bị</button>
          <button id="disconnectBtn" disabled="" class="control-btn">
            Ngắt kết nối thiết bị
          </button>
          <button id="syncTimeBtn" disabled="" class="control-btn">
            Đồng bộ thời gian
          </button>
          <button id="imageModeBtn" disabled="" class="control-btn">
            Chế độ hình ảnh
          </button>
          <button id="timeModeBtn" disabled="" class="control-btn">
            Chế độ thời gian
          </button>
          <button id="calendarModeBtn" disabled="" class="control-btn">
            Chế độ lịch
          </button>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 20px; color: #4a5568">Truyền hình ảnh</h2>

        <div class="file-input">
          <input type="file" id="imageFile" accept="image/*" />
        </div>

        <div class="buttons">
          <button id="sendBtn" disabled="">Toàn bộ quy trình tải lên</button>
          <button id="writeImageBtn" disabled="">Ghi dữ liệu hình ảnh</button>
          <button id="displayImageBtn" disabled="">Hiển thị hình ảnh</button>
          <button id="saveImageBtn" disabled="">Lưu vào Flash</button>
          <button id="clearBtn" disabled="">Xóa hiển thị</button>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 20px; color: #4a5568">Xử lý hình ảnh</h2>

        <div class="image-settings" style="display: none">
          <div class="setting-group">
            <label for="canvasSize">Kích thước Canvas</label>
            <select id="canvasSize">
              <option value="256x128">256x128</option>
            </select>
          </div>
          <div class="setting-group">
            <label for="colorMode">Chế độ màu</label>
            <select id="colorMode">
              <option value="mono">Đơn sắc</option>
            </select>
          </div>
          <div class="setting-group">
            <label for="dithering">Thuật toán Dithering</label>
            <select id="dithering">
              <option value="none">Không</option>
              <option value="ordered">Dithering có trật tự</option>
              <option value="floyd-steinberg">Floyd-Steinberg</option>
            </select>
          </div>
          <div class="setting-group">
            <label for="ditherIntensity">Cường độ Dithering</label>
            <input
              type="range"
              id="ditherIntensity"
              min="0"
              max="2"
              step="0.1"
              value="1.0"
            />
          </div>
          <div class="setting-group">
            <label for="brightness">Độ sáng</label>
            <input type="range" id="brightness" min="0" max="200" value="100" />
          </div>
          <div class="setting-group">
            <label for="contrast">Độ tương phản</label>
            <input type="range" id="contrast" min="0" max="200" value="100" />
          </div>
          <div class="setting-group">
            <label for="mtu">MTU</label>
            <select id="mtu">
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="200">200</option>
              <option value="500">500</option>
            </select>
          </div>
          <div class="setting-group">
            <label for="confirmInterval">Khoảng thời gian xác nhận</label>
            <input
              type="range"
              id="confirmInterval"
              min="0"
              max="100"
              value="20"
            />
          </div>
        </div>

        <div
          style="
            margin: 20px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
          "
        >
          <h3 style="margin-bottom: 16px; color: #4a5568">
            Xem trước hình ảnh
          </h3>
          <div
            style="display: flex; justify-content: center; align-items: center"
          >
            <canvas
              id="imagePreview"
              width="256"
              height="128"
              style="
                border: 1px solid #ddd;
                border-radius: 8px;
                background: white;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
              "
            ></canvas>
          </div>
        </div>

        <div class="buttons">
          <button id="generateCodeBtn" class="generate-btn">
            Tạo mã hình ảnh
          </button>
          <button id="uploadCodeBtn" disabled="" class="upload-btn">
            Tải lên mã đã tạo
          </button>
        </div>

        <div id="progress">
          <div id="progress-bar"></div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 20px; color: #4a5568">
          Chỉnh sửa mã hình ảnh
        </h2>

        <div class="code-editor">
          <h3>Mã hình ảnh đã tạo (có thể chỉnh sửa)</h3>
          <textarea
            id="imageCode"
            placeholder="Mã hình ảnh đã tạo sẽ hiển thị ở đây..."
          ></textarea>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom: 20px; color: #4a5568">Trạng thái thiết bị</h2>
        <div id="status">Đang chờ kết nối...</div>
      </div>
    </div>

    <script>
      // Các phần tử DOM
      const connectBtn = document.getElementById("connectBtn");
      const sendBtn = document.getElementById("sendBtn");
      const writeImageBtn = document.getElementById("writeImageBtn");
      const displayImageBtn = document.getElementById("displayImageBtn");
      const saveImageBtn = document.getElementById("saveImageBtn");
      const clearBtn = document.getElementById("clearBtn");
      const disconnectBtn = document.getElementById("disconnectBtn");
      const generateCodeBtn = document.getElementById("generateCodeBtn");
      const uploadCodeBtn = document.getElementById("uploadCodeBtn");
      const imageFile = document.getElementById("imageFile");
      const status = document.getElementById("status");
      const progressBar = document.getElementById("progress-bar");
      const imageCode = document.getElementById("imageCode");
      const imagePreview = document.getElementById("imagePreview");

      // Gỡ lỗi: Kiểm tra xem generateCodeBtn đã được lấy chính xác chưa
      console.log("Đã lấy xong phần tử DOM:");
      console.log("generateCodeBtn:", generateCodeBtn);
      console.log("generateCodeBtn có tồn tại không:", !!generateCodeBtn);

      // Đảm bảo trình nghe sự kiện được liên kết chính xác
      if (generateCodeBtn) {
        console.log("Trình nghe sự kiện generateCodeBtn sẽ được liên kết");
      } else {
        console.error(
          "Phần tử generateCodeBtn không tồn tại, không thể liên kết trình nghe sự kiện",
        );
      }

      // Hiển thị thời gian hiện tại
      const currentTimeElement = document.getElementById("currentTime");

      // Nút chọn chế độ
      const syncTimeBtn = document.getElementById("syncTimeBtn");
      const imageModeBtn = document.getElementById("imageModeBtn");
      const timeModeBtn = document.getElementById("timeModeBtn");
      const calendarModeBtn = document.getElementById("calendarModeBtn");

      // Các phần tử UI mới được thêm vào
      const canvasSize = document.getElementById("canvasSize");
      const colorMode = document.getElementById("colorMode");
      const brightness = document.getElementById("brightness");
      const contrast = document.getElementById("contrast");
      const dithering = document.getElementById("dithering");
      const ditherIntensity = document.getElementById("ditherIntensity");
      const mtu = document.getElementById("mtu");
      const confirmInterval = document.getElementById("confirmInterval");

      // Thông số xử lý hình ảnh
      let imageParams = {
        brightness: 100,
        contrast: 100,
        dithering: "none",
        ditherIntensity: 1.0,
        mtu: 20,
        confirmInterval: 20,
      };

      // Cập nhật hiển thị thời gian hiện tại
      function updateCurrentTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");
        const seconds = String(now.getSeconds()).padStart(2, "0");

        currentTimeElement.textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
      }

      // Cập nhật thời gian một lần khi khởi tạo
      updateCurrentTime();
      // Thiết lập bộ hẹn giờ cập nhật thời gian mỗi giây
      setInterval(updateCurrentTime, 1000);

      // Cập nhật xem trước hình ảnh
      async function updateImagePreview() {
        const file = imageFile.files[0];
        const ctx = imagePreview.getContext("2d");

        try {
          if (file) {
            // Nếu có tệp được chọn, xử lý và hiển thị hình ảnh
            const image = await createImageBitmap(file);
            const resizedImageData = resizeImage(image, 256, 128);
            const ditheredImageData = applyDithering(
              resizedImageData,
              imageParams.dithering,
              imageParams.ditherIntensity,
            );

            // Áp dụng điều chỉnh độ sáng và độ tương phản
            const data = new Uint8Array(ditheredImageData.data);
            const brightnessFactor = imageParams.brightness / 100;
            const contrastFactor = imageParams.contrast / 100;

            for (let i = 0; i < data.length; i += 4) {
              let r = data[i];
              let g = data[i + 1];
              let b = data[i + 2];

              // Áp dụng điều chỉnh độ sáng và độ tương phản
              r =
                Math.round((r - 128) * contrastFactor + 128) * brightnessFactor;
              g =
                Math.round((g - 128) * contrastFactor + 128) * brightnessFactor;
              b =
                Math.round((b - 128) * contrastFactor + 128) * brightnessFactor;

              // Đảm bảo giá trị nằm trong phạm vi 0-255
              r = Math.max(0, Math.min(255, r));
              g = Math.max(0, Math.min(255, g));
              b = Math.max(0, Math.min(255, b));

              data[i] = r;
              data[i + 1] = g;
              data[i + 2] = b;
            }

            // Tạo đối tượng ImageData mới
            const processedImageData = new ImageData(
              new Uint8ClampedArray(data),
              ditheredImageData.width,
              ditheredImageData.height,
            );

            // Vẽ lên canvas xem trước
            ctx.putImageData(processedImageData, 0, 0);
          } else {
            // Nếu không có tệp nào được chọn, tạo canvas trống
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, imagePreview.width, imagePreview.height);
          }
        } catch (error) {
          console.error("Cập nhật bản xem trước thất bại:", error);
        }
      }

      // Lắng nghe thay đổi thông số
      brightness.addEventListener("input", (e) => {
        imageParams.brightness = parseInt(e.target.value);
        updateImagePreview();
      });

      contrast.addEventListener("input", (e) => {
        imageParams.contrast = parseInt(e.target.value);
        updateImagePreview();
      });

      dithering.addEventListener("change", (e) => {
        imageParams.dithering = e.target.value;
        updateImagePreview();
      });

      ditherIntensity.addEventListener("input", (e) => {
        imageParams.ditherIntensity = parseFloat(e.target.value);
        updateImagePreview();
      });

      mtu.addEventListener("change", (e) => {
        imageParams.mtu = parseInt(e.target.value);
      });

      confirmInterval.addEventListener("input", (e) => {
        imageParams.confirmInterval = parseInt(e.target.value);
      });

      // Cập nhật xem trước khi chọn tệp
      imageFile.addEventListener("change", updateImagePreview);

      // Lưu trữ dữ liệu hình ảnh đã tạo để thuận tiện tải lên sau này
      let generatedImageData = null;

      // Hàm reset UI về trạng thái chưa kết nối
      function resetUIState() {
        if (connectBtn) connectBtn.disabled = false;
        if (sendBtn) sendBtn.disabled = true;
        if (writeImageBtn) writeImageBtn.disabled = true;
        if (displayImageBtn) displayImageBtn.disabled = true;
        if (saveImageBtn) saveImageBtn.disabled = true;
        if (clearBtn) clearBtn.disabled = true;
        if (disconnectBtn) disconnectBtn.disabled = true;

        // Tắt các nút chọn chế độ
        if (syncTimeBtn) {
          syncTimeBtn.disabled = true;
          syncTimeBtn.classList.remove("connected");
        }
        if (imageModeBtn) {
          imageModeBtn.disabled = true;
          imageModeBtn.classList.remove("connected");
        }
        if (timeModeBtn) {
          timeModeBtn.disabled = true;
          timeModeBtn.classList.remove("connected");
        }
        if (calendarModeBtn) {
          calendarModeBtn.disabled = true;
          calendarModeBtn.classList.remove("connected");
        }
      }

      // Thông tin thiết bị
      const SERVICE_UUID = "00001f10-0000-1000-8000-00805f9b34fb";
      const CHARACTERISTIC_UUID = "00001f1f-0000-1000-8000-00805f9b34fb";

      // Thông số hình ảnh
      // Bộ đệm EPD của thiết bị là 256x128, tương đương 4096 byte (1 byte = 8 pixel)
      const IMAGE_WIDTH = 256; // Chiều rộng bộ đệm EPD
      const IMAGE_HEIGHT = 128; // Chiều cao bộ đệm EPD
      const DISPLAY_WIDTH = 212; // Chiều rộng hiển thị EPD thực tế
      const DISPLAY_HEIGHT = 104; // Chiều cao hiển thị EPD thực tế
      // Kích thước bộ đệm cố định là 4096 byte, 1 byte tương đương 8 pixel
      const BUFFER_SIZE = 4096;
      const MTU_SIZE = 20; // Kích thước BLE MTU, cải thiện hiệu quả truyền

      // Định nghĩa lệnh
      const CMD_CLEAR_DISPLAY = 0x00;
      const CMD_DISPLAY_IMAGE = 0x01;
      const CMD_SET_BYTE_POS = 0x02;
      const CMD_WRITE_DATA = 0x03;
      const CMD_SAVE_IMAGE = 0x04;
      const CMD_SET_MODE = 0x05;
      const CMD_SET_IMAGE_SIZE = 0x06;

      // Các biến liên quan đến Bluetooth
      let device, server, service, characteristic, dataCharacteristic;

      // UUID của Dịch vụ, phân chia chức năng:
      // - CHARACTERISTIC_2_UUID (00001f1f): Lệnh điều khiển (0xDD timestamp, 0xE1 mode, 0xE2 refresh)
      // - CHARACTERISTIC_DATA_UUID (00001f11): Lệnh dữ liệu ảnh (0x00-0x06)
      const SERVICE_2_UUID = "00001f10-0000-1000-8000-00805f9b34fb";
      const CHARACTERISTIC_2_UUID = "00001f1f-0000-1000-8000-00805f9b34fb";
      const CHARACTERISTIC_DATA_UUID = "00001f11-0000-1000-8000-00805f9b34fb";

      // Cập nhật trạng thái
      const updateStatus = (msg) => {
        status.textContent += msg + "\n";
        console.log(msg);
      };

      // Cập nhật tiến trình
      function updateProgress(percent) {
        progressBar.style.width = percent + "%";
      }

      // Kết nối thiết bị
      connectBtn.onclick = async () => {
        try {
          status.textContent = ""; // Xóa trạng thái
          updateStatus("Đang yêu cầu thiết bị Bluetooth...");

          // Kiểm tra xem trình duyệt có hỗ trợ Web Bluetooth API không
          if (!navigator.bluetooth) {
            updateStatus(
              "Lỗi: Trình duyệt của bạn không hỗ trợ Web Bluetooth API, vui lòng sử dụng Chrome hoặc Edge",
            );
            return;
          }

          // Yêu cầu thiết bị Bluetooth
          const deviceOptions = {
            filters: [
              { namePrefix: "IOT-EINK" },
              { namePrefix: "DLG" },
              { namePrefix: "EINK" },
            ],
            optionalServices: [SERVICE_2_UUID],
          };

          updateStatus("Đang mở trình chọn thiết bị Bluetooth...");
          device = await navigator.bluetooth.requestDevice(deviceOptions);
          updateStatus("Đã tìm thấy thiết bị: " + device.name);

          // Kết nối máy chủ GATT với cơ chế thử lại (Retry)
          let connected = false;
          let retries = 3;
          while (retries > 0 && !connected) {
            try {
              updateStatus(
                `Đang kết nối với máy chủ GATT (còn ${retries} lần thử)...`,
              );
              server = await device.gatt.connect();
              connected = true;
            } catch (error) {
              retries--;
              if (retries === 0) throw error;
              updateStatus("Kết nối thất bại, đang thử lại sau 1 giây...");
              await new Promise((resolve) => setTimeout(resolve, 1000));
            }
          }
          updateStatus("Kết nối máy chủ GATT thành công");

          // Đợi một chút để stack Bluetooth ổn định
          await new Promise((resolve) => setTimeout(resolve, 500));

          // Sau khi kết nối thành công, thêm trình nghe ngắt kết nối thiết bị
          device.addEventListener("gattserverdisconnected", () => {
            updateStatus("Thiết bị đã ngắt kết nối");
            // Cập nhật trạng thái nút về trạng thái chưa kết nối
            resetUIState();
          });

          updateStatus("Đang kết nối trực tiếp với dịch vụ điều khiển...");
          service = await server.getPrimaryService(SERVICE_2_UUID);
          updateStatus("Kết nối Dịch vụ 2 thành công");

          updateStatus("Đang lấy đặc tính điều khiển (00001f1f)...");
          characteristic = await service.getCharacteristic(
            CHARACTERISTIC_2_UUID,
          );
          updateStatus("Lấy đặc tính điều khiển thành công!");

          updateStatus("Đang lấy đặc tính dữ liệu ảnh (00001f11)...");
          dataCharacteristic = await service.getCharacteristic(
            CHARACTERISTIC_DATA_UUID,
          );
          updateStatus("Lấy đặc tính dữ liệu ảnh thành công!");
          updateStatus("Kết nối thành công!");

          // Cập nhật trạng thái nút
          if (connectBtn) connectBtn.disabled = true;
          if (sendBtn) sendBtn.disabled = false;
          if (writeImageBtn) writeImageBtn.disabled = false;
          if (displayImageBtn) displayImageBtn.disabled = false;
          if (saveImageBtn) saveImageBtn.disabled = false;
          if (clearBtn) clearBtn.disabled = false;
          if (disconnectBtn) disconnectBtn.disabled = false;
          // Bật các nút chọn chế độ
          if (syncTimeBtn) syncTimeBtn.disabled = false;
          if (imageModeBtn) imageModeBtn.disabled = false;
          if (timeModeBtn) timeModeBtn.disabled = false;
          if (calendarModeBtn) calendarModeBtn.disabled = false;

          // Thêm lớp connected, thay đổi màu nút
          if (syncTimeBtn) syncTimeBtn.classList.add("connected");
          if (imageModeBtn) imageModeBtn.classList.add("connected");
          if (timeModeBtn) timeModeBtn.classList.add("connected");
          if (calendarModeBtn) calendarModeBtn.classList.add("connected");
        } catch (e) {
          updateStatus("Kết nối thất bại: " + e);
          updateStatus("Chi tiết lỗi: " + e.stack);

          // Cung cấp gợi ý dựa trên loại lỗi
          if (e.name === "NotFoundError") {
            updateStatus(
              'Gợi ý: Không tìm thấy thiết bị phù hợp, hãy đảm bảo thiết bị đã bật và tên bắt đầu bằng "IOT-EINK"',
            );
          } else if (e.name === "SecurityError") {
            updateStatus(
              "Gợi ý: Không có quyền truy cập thiết bị Bluetooth, vui lòng kiểm tra cài đặt trình duyệt",
            );
          } else if (e.name === "NetworkError") {
            updateStatus(
              "Gợi ý: Lỗi mạng, hãy đảm bảo thiết bị trong phạm vi hợp lệ",
            );
          }
        }
      };

      // Ngắt kết nối
      disconnectBtn.onclick = async () => {
        if (device && device.gatt.connected) {
          device.gatt.disconnect();
          updateStatus("Thiết bị đã ngắt kết nối");
        }

        // Cập nhật trạng thái nút
        if (connectBtn) connectBtn.disabled = false;
        if (sendBtn) sendBtn.disabled = true;
        if (writeImageBtn) writeImageBtn.disabled = true;
        if (displayImageBtn) displayImageBtn.disabled = true;
        if (saveImageBtn) saveImageBtn.disabled = true;
        if (clearBtn) clearBtn.disabled = true;
        if (disconnectBtn) disconnectBtn.disabled = true;
        if (uploadCodeBtn) uploadCodeBtn.disabled = true;
        // Tắt các nút chọn chế độ
        if (syncTimeBtn) syncTimeBtn.disabled = true;
        if (imageModeBtn) imageModeBtn.disabled = true;
        if (timeModeBtn) timeModeBtn.disabled = true;
        if (calendarModeBtn) calendarModeBtn.disabled = true;

        // Xóa lớp connected, khôi phục màu nút ban đầu
        if (syncTimeBtn) syncTimeBtn.classList.remove("connected");
        if (imageModeBtn) imageModeBtn.classList.remove("connected");
        if (timeModeBtn) timeModeBtn.classList.remove("connected");
        if (calendarModeBtn) calendarModeBtn.classList.remove("connected");
      };

      // Hàm độ trễ
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      // Hàm gửi dấu thời gian
      async function sendTimestamp(unixTime) {
        // Tạo gói dữ liệu: 0xDD + 4 byte dấu thời gian (byte cao trước)
        const buffer = new Uint8Array(5);
        buffer[0] = 0xdd;
        buffer[1] = (unixTime >> 24) & 0xff;
        buffer[2] = (unixTime >> 16) & 0xff;
        buffer[3] = (unixTime >> 8) & 0xff;
        buffer[4] = unixTime & 0xff;
        updateStatus(
          "Gửi dữ liệu: " +
            Array.from(buffer)
              .map((b) => b.toString(16).padStart(2, "0"))
              .join(" "),
        );

      // Điều chỉnh kích thước hình ảnh, đảm bảo tạo hình ảnh độ phân giải 256x128
      function resizeImage(image, width, height) {
        // Màn hình thực tế của thiết bị là 256x128, vì vậy độ phân giải này được tạo cố định
        const targetWidth = 256;
        const targetHeight = 128;

        const canvas = document.createElement("canvas");
        canvas.width = targetWidth;
        canvas.height = targetHeight;

        const ctx = canvas.getContext("2d");

        // Đầu tiên vẽ nền trắng
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, targetWidth, targetHeight);

        // Vẽ hình ảnh, sử dụng độ phân giải mục tiêu
        ctx.drawImage(image, 0, 0, targetWidth, targetHeight);

        return ctx.getImageData(0, 0, targetWidth, targetHeight);
      }

      // Áp dụng thuật toán Dithering
      function applyDithering(imageData, ditherType, intensity) {
        const width = imageData.width;
        const height = imageData.height;
        const data = new Uint8Array(imageData.data);
        const output = new Uint8Array(data.length);

        // Sao chép dữ liệu gốc
        output.set(data);

        if (ditherType === "none") {
          return imageData;
        }

        // Thuật toán Dithering Floyd-Steinberg
        if (ditherType === "floyd-steinberg") {
          for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
              const index = (y * width + x) * 4;
              const oldR = output[index];
              const oldG = output[index + 1];
              const oldB = output[index + 2];

              // Chuyển đổi sang thang độ xám
              const oldGray = Math.round(
                0.299 * oldR + 0.587 * oldG + 0.114 * oldB,
              );

              // Áp dụng dithering
              const newGray = oldGray < 128 ? 0 : 255;
              const error = (oldGray - newGray) * intensity;

              // Ghi lại giá trị mới
              const newR = newGray;
              const newG = newGray;
              const newB = newGray;

              output[index] = newR;
              output[index + 1] = newG;
              output[index + 2] = newB;

              // Lan truyền lỗi
              const errorSpread = [
                { x: 1, y: 0, factor: 7 / 16 },
                { x: -1, y: 1, factor: 3 / 16 },
                { x: 0, y: 1, factor: 5 / 16 },
                { x: 1, y: 1, factor: 1 / 16 },
              ];

              for (const spread of errorSpread) {
                const nx = x + spread.x;
                const ny = y + spread.y;
                if (nx >= 0 && nx < width && ny < height) {
                  const nIndex = (ny * width + nx) * 4;
                  output[nIndex] = Math.max(
                    0,
                    Math.min(255, output[nIndex] + error * spread.factor),
                  );
                  output[nIndex + 1] = Math.max(
                    0,
                    Math.min(255, output[nIndex + 1] + error * spread.factor),
                  );
                  output[nIndex + 2] = Math.max(
                    0,
                    Math.min(255, output[nIndex + 2] + error * spread.factor),
                  );
                }
              }
            }
          }
        }
        // Thuật toán Dithering có trật tự
        else if (ditherType === "ordered") {
          // Ma trận dithering 4x4
          const ditherMatrix = [
            [0, 8, 2, 10],
            [12, 4, 14, 6],
            [3, 11, 1, 9],
            [15, 7, 13, 5],
          ];
          const matrixSize = 4;

          for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
              const index = (y * width + x) * 4;
              const oldR = output[index];
              const oldG = output[index + 1];
              const oldB = output[index + 2];

              // Chuyển đổi sang thang độ xám
              const oldGray = Math.round(
                0.299 * oldR + 0.587 * oldG + 0.114 * oldB,
              );

              // Áp dụng Dithering có trật tự
              const matrixX = x % matrixSize;
              const matrixY = y % matrixSize;
              const threshold =
                (ditherMatrix[matrixY][matrixX] / (matrixSize * matrixSize)) *
                255 *
                intensity;

              const newGray = oldGray < threshold ? 0 : 255;

              // Ghi lại giá trị mới
              const newR = newGray;
              const newG = newGray;
              const newB = newGray;

              output[index] = newR;
              output[index + 1] = newG;
              output[index + 2] = newB;
            }
          }
        }

        // Tạo đối tượng ImageData mới
        const newImageData = new ImageData(
          new Uint8ClampedArray(output),
          width,
          height,
        );
        return newImageData;
      }

      // Chuyển đổi hình ảnh sang định dạng dữ liệu phù hợp để hiển thị EPD (chế độ quét dọc Đơn sắc image2lcd)
      function convertImageToEPDData(imageData) {
        // Thiết bị sử dụng bộ đệm 256x128
        const targetWidth = 256;
        const targetHeight = 128;

        // Lấy thông số xử lý hình ảnh
        const brightnessFactor = imageParams.brightness / 100;
        const contrastFactor = imageParams.contrast / 100;

        // Tạo ImageData tạm thời để xử lý
        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = targetWidth;
        tempCanvas.height = targetHeight;
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.putImageData(imageData, 0, 0);

        // Lấy dữ liệu hình ảnh gốc
        let data = tempCtx.getImageData(0, 0, targetWidth, targetHeight);
        const pixelData = new Uint8Array(data.data);

        // Áp dụng điều chỉnh độ sáng và độ tương phản
        for (let i = 0; i < pixelData.length; i += 4) {
          let r = pixelData[i];
          let g = pixelData[i + 1];
          let b = pixelData[i + 2];

          // Áp dụng điều chỉnh độ sáng và độ tương phản
          r = Math.round((r - 128) * contrastFactor + 128) * brightnessFactor;
          g = Math.round((g - 128) * contrastFactor + 128) * brightnessFactor;
          b = Math.round((b - 128) * contrastFactor + 128) * brightnessFactor;

          // Đảm bảo giá trị nằm trong phạm vi 0-255
          r = Math.max(0, Math.min(255, r));
          g = Math.max(0, Math.min(255, g));
          b = Math.max(0, Math.min(255, b));

          pixelData[i] = r;
          pixelData[i + 1] = g;
          pixelData[i + 2] = b;
        }

        // Cập nhật dữ liệu hình ảnh của canvas tạm thời
        data.data.set(pixelData);
        tempCtx.putImageData(data, 0, 0);

        // Áp dụng thuật toán Dithering
        const ditheredImageData = applyDithering(
          data,
          imageParams.dithering,
          imageParams.ditherIntensity,
        );

        // Tạo bộ đệm đầu ra (cố định 4096 byte)
        const epdData = new Uint8Array(BUFFER_SIZE);

        // Đảm bảo dữ liệu được khởi tạo thành 0
        epdData.fill(0);

        // Lấy dữ liệu hình ảnh sau khi dithering
        const ditheredData = ditheredImageData.data;

        // Chế độ quét dọc image2lcd: trước tiên duyệt qua các cột x, sau đó duyệt qua các hàng y
        // Mỗi 8 pixel dọc tạo thành một byte, bit cao trước
        // Định dạng dữ liệu: 16 byte mỗi 8 hàng (128 hàng/8=16), sắp xếp theo chiều dọc từ trái sang phải, từ trên xuống dưới
        for (let x = 0; x < targetWidth; x++) {
          for (let y = 0; y < targetHeight; y += 8) {
            // Mỗi byte chứa 8 pixel dọc
            let byte = 0;
            for (let bit = 0; bit < 8; bit++) {
              // Đảm bảo y+bit không vượt quá phạm vi
              if (y + bit < targetHeight) {
                const index = ((y + bit) * targetWidth + x) * 4;

                // Lấy giá trị RGB (sau khi dithering đã là đen trắng)
                const r = ditheredData[index];

                // Chuyển đổi thành giá trị pixel EPD (0=Đen, 1=Trắng)
                // Xử lý đảo màu: Giá trị thang xám nhỏ hơn 128 là màu trắng (0), lớn hơn hoặc bằng 128 là màu đen (1)
                const epdPixel = r < 128 ? 0 : 1;

                // Thiết lập bit tương ứng trong byte (bit cao trước)
                byte |= epdPixel << (7 - bit);
              }
            }

            // Tính toán vị trí trong dữ liệu EPD
            // Mỗi cột có 16 byte (128 hàng/8=16), vì vậy offset cột là x * 16
            // Offset hàng là (y / 8), vì mỗi 8 hàng tạo thành một byte
            const epdIndex = x * (targetHeight / 8) + y / 8;
            epdData[epdIndex] = byte;
          }
        }

        return epdData;
      }

      // Chuyển đổi Uint8Array sang định dạng chuỗi có thể chỉnh sửa
      function imageDataToString(epdData) {
        let str = "";
        for (let i = 0; i < epdData.length; i++) {
          str += "0x" + epdData[i].toString(16).padStart(2, "0");
          if (i < epdData.length - 1) {
            str += ",";
            // Xuống dòng mỗi 16 byte để cải thiện khả năng đọc
            if ((i + 1) % 16 === 0) {
              str += "\n";
            } else {
              str += " ";
            }
          }
        }
        return str;
      }

      // Chuyển đổi chuỗi đã chỉnh sửa trở lại Uint8Array
      function stringToImageData(str) {
        // Đầu tiên loại bỏ dấu ngoặc nhọn hoặc ngoặc vuông của mảng, sau đó khớp tất cả các số thập lục phân định dạng 0xXX hoặc 0Xxx
        const cleanStr = str.replace(/[\[\]{}]/g, "");
        // Khớp tất cả các số thập lục phân định dạng 0xXX hoặc 0Xxx (hỗ trợ chữ hoa chữ thường)
        const matches = cleanStr.match(/0[xX][0-9a-fA-F]{2}/g) || [];

        if (matches.length === 0) {
          throw new Error(
            "Không tìm thấy dữ liệu định dạng 0xXX hoặc 0Xxx hợp lệ",
          );
        }

        const result = new Uint8Array(matches.length);
        for (let i = 0; i < matches.length; i++) {
          // Loại bỏ tiền tố 0x hoặc 0X và chuyển đổi thành giá trị số
          result[i] = parseInt(matches[i].substring(2), 16);
        }
        return result;
      }

          const epdData = convertImageToEPDData(resizedImageData);

            "Chuyển đổi định dạng dữ liệu EPD thành công, epdData:",
            epdData,
          );

          // Lưu trữ dữ liệu đã tạo để thuận tiện sử dụng chức năng độc lập sau này
          generatedImageData = epdData;

          // Chuyển đổi sang định dạng chuỗi và hiển thị
          updateStatus("Đang chuyển đổi sang định dạng chuỗi...");
          const codeStr = imageDataToString(epdData);
          console.log(
            "Chuyển đổi định dạng chuỗi thành công, độ dài codeStr:",
            codeStr.length,
          );

          if (imageCode) {
            imageCode.value = codeStr;
            console.log("Mã đã được hiển thị trong hộp văn bản");
          } else {
            console.error("Phần tử imageCode không tồn tại");
          }

          // Bật các nút liên quan
          if (uploadCodeBtn) {
            uploadCodeBtn.disabled = false;
            console.log("uploadCodeBtn đã được bật");
          } else {
            console.error("Phần tử uploadCodeBtn không tồn tại");
          }

          updateStatus(
            'Tạo mã hình ảnh thành công! Bạn có thể:\n1. Nhấp trực tiếp vào "Tải lên mã đã sửa đổi" để hoàn thành toàn bộ quy trình\n2. Thực hiện thủ công: Ghi dữ liệu hình ảnh → Hiển thị hình ảnh → Lưu vào Flash',
          );
        } catch (error) {
          console.error("Tạo mã hình ảnh thất bại:", error);
          console.error("Chi tiết lỗi:", error.stack);
          updateStatus("Tạo mã hình ảnh thất bại: " + error);
          updateStatus("Chi tiết lỗi: " + error.stack);
        }
      };

      // Tải lên mã đã sửa đổi
      uploadCodeBtn.onclick = async () => {
        if (!characteristic) {
          updateStatus("Vui lòng Kết nối thiết bị trước");
          return;
        }

        const codeStr = imageCode.value;
        if (!codeStr.trim()) {
          updateStatus("Vui lòng tạo hoặc chỉnh sửa mã hình ảnh");
          return;
        }

        try {
          updateStatus("Đang phân tích mã đã sửa đổi...");

          // Chuyển đổi chuỗi trở lại Uint8Array
          const epdData = stringToImageData(codeStr);

          // Chuyển sang chế độ hình ảnh TRƯỚC khi tải ảnh để app Đồng hồ ngừng ghi đè màn hình
          updateStatus("Đang chuyển sang chế độ hình ảnh để nhận dữ liệu...");
          await sendCommand(0xe1, [0]);
          await delay(500); // Đợi thiết bị chuyển chế độ

          updateStatus("Đang gửi dữ liệu hình ảnh...");
          updateProgress(0);

          // 1. Thiết lập kích thước hình ảnh
          await sendDataCommand(CMD_SET_IMAGE_SIZE, [
            (epdData.length >> 24) & 0xff,
            (epdData.length >> 16) & 0xff,
            (epdData.length >> 8) & 0xff,
            epdData.length & 0xff,
          ]);

          // 2. Gửi dữ liệu theo khối
          let offset = 0;
          let chunkCount = 0;
          const totalChunks = Math.ceil(epdData.length / (imageParams.mtu - 3));

          while (offset < epdData.length) {
            const chunkSize = Math.min(
              imageParams.mtu - 3,
              epdData.length - offset,
            );
            const chunk = epdData.slice(offset, offset + chunkSize);

            // Xây dựng gói dữ liệu (Lệnh + Offset 8 bit cao + Offset 8 bit thấp + Dữ liệu)
            const dataPacket = new Uint8Array(3 + chunkSize);
            dataPacket[0] = CMD_WRITE_DATA;
            dataPacket[1] = (offset >> 8) & 0xff;
            dataPacket[2] = offset & 0xff;
            dataPacket.set(chunk, 3);

            // Gửi gói dữ liệu qua characteristic dữ liệu ảnh (00001f11)
            await sendDataCommand(
              dataPacket[0],
              Array.from(dataPacket.slice(1)),
            );

            offset += chunkSize;
            chunkCount++;

            // Cập nhật tiến trình
            const progress = Math.round((offset / epdData.length) * 100);
            updateProgress(progress);
            updateStatus(`Đang gửi dữ liệu hình ảnh... ${progress}%`);

            // Đợi một chút để tránh mất dữ liệu
            await new Promise((resolve) =>
              setTimeout(resolve, imageParams.confirmInterval),
            );
          }

          // 3. Hiển thị hình ảnh
          updateStatus("Đang hiển thị hình ảnh...");
          await sendDataCommand(CMD_DISPLAY_IMAGE);

          // 4. Lưu hình ảnh vào SPI Flash
          updateStatus("Đang lưu hình ảnh vào Flash...");
          await sendDataCommand(CMD_SAVE_IMAGE);

          // Chờ để Flash lưu xong trước khi Refresh
          await delay(1000);

          // 5. Cập nhật màn hình EPD (qua 00001f1f)
          updateStatus("Đang cập nhật màn hình...");
          await sendCommand(0xe2); // Lệnh cập nhật màn hình

          updateStatus(
            "Tải lên mã hình ảnh đã sửa đổi thành công! Màn hình đã được cập nhật.",
          );
          updateProgress(100);
        } catch (error) {
          updateStatus("Tải lên mã đã sửa đổi thất bại: " + error);
          console.error("Tải lên mã đã sửa đổi thất bại:", error);
        }
      };

      // Gửi hình ảnh
      sendBtn.onclick = async () => {
        const file = imageFile.files[0];
        if (!file) {
          updateStatus("Vui lòng chọn một hình ảnh");
          return;
        }

        try {
          updateStatus("Đang xử lý hình ảnh...");

          // Đọc tệp hình ảnh
          const image = await createImageBitmap(file);

          // Điều chỉnh kích thước hình ảnh
          const resizedImageData = resizeImage(
            image,
            IMAGE_WIDTH,
            IMAGE_HEIGHT,
          );

          // Chuyển đổi sang định dạng dữ liệu EPD
          const epdData = convertImageToEPDData(resizedImageData);

          // Đồng thời lưu trữ dữ liệu đã tạo để thuận tiện chỉnh sửa sau này
          generatedImageData = epdData;

          // Hiển thị dữ liệu vào hộp chỉnh sửa
          const codeStr = imageDataToString(epdData);
          imageCode.value = codeStr;

          // Bật nút tải lên
          uploadCodeBtn.disabled = false;

          // Chuyển sang chế độ hình ảnh TRƯỚC khi tải ảnh để app Đồng hồ ngừng ghi đè màn hình
          updateStatus("Đang chuyển sang chế độ hình ảnh để nhận dữ liệu...");
          await sendCommand(0xe1, [0]);
          await delay(500); // Đợi thiết bị chuyển chế độ

          updateStatus("Đang gửi dữ liệu hình ảnh...");
          updateProgress(0);

          // 1. Thiết lập kích thước hình ảnh
          await sendDataCommand(CMD_SET_IMAGE_SIZE, [
            (epdData.length >> 24) & 0xff,
            (epdData.length >> 16) & 0xff,
            (epdData.length >> 8) & 0xff,
            epdData.length & 0xff,
          ]);

          // 2. Gửi dữ liệu theo khối (Cố định 16 byte/gói)
          let offset = 0;
          let chunkCount = 0;
          const totalChunks = Math.ceil(epdData.length / 16);

          while (offset < epdData.length) {
            const chunkSize = Math.min(16, epdData.length - offset);
            const chunk = epdData.slice(offset, offset + chunkSize);

            // Xây dựng gói dữ liệu
            const dataPacket = new Uint8Array(3 + chunkSize);
            dataPacket[0] = CMD_WRITE_DATA;
            dataPacket[1] = (offset >> 8) & 0xff;
            dataPacket[2] = offset & 0xff;
            dataPacket.set(chunk, 3);

            // Gửi gói dữ liệu qua characteristic dữ liệu ảnh (00001f11)
            await sendDataCommand(
              dataPacket[0],
              Array.from(dataPacket.slice(1)),
            );

            offset += chunkSize;
            chunkCount++;

            // Cập nhật tiến trình
            const progress = Math.round((offset / epdData.length) * 100);
            updateProgress(progress);
            updateStatus(`Đang gửi dữ liệu hình ảnh... ${progress}%`);

            // Đợi một chút để tránh mất dữ liệu
            await new Promise((resolve) => setTimeout(resolve, 20));
          }

          // 3. Hiển thị hình ảnh
          updateStatus("Đang hiển thị hình ảnh...");
          await sendDataCommand(CMD_DISPLAY_IMAGE);

          // 4. Lưu hình ảnh vào SPI Flash
          updateStatus("Đang lưu hình ảnh vào Flash...");
          await sendDataCommand(CMD_SAVE_IMAGE);

          // Chờ để Flash lưu xong trước khi Refresh
          await delay(1000);

          // 5. Cập nhật màn hình EPD
          updateStatus("Đang cập nhật màn hình...");
          await sendCommand(0xe2); // Lệnh cập nhật màn hình

          updateStatus(
            "Đã gửi hình ảnh thành công! Màn hình đã được cập nhật.",
          );
          updateProgress(100);
        } catch (error) {
          updateStatus("Gửi hình ảnh thất bại: " + error);
          console.error("Gửi hình ảnh thất bại:", error);
        }
      };

      // Lắng nghe thiết bị ngắt kết nối
      window.addEventListener("beforeunload", () => {
        if (device && device.gatt.connected) {
          device.gatt.disconnect();
        }
      });
    </script>
  </body>
